apiVersion: apps/v1
kind: Deployment
metadata:
  name: qgis
  namespace: {{ .Release.Namespace | default "qgis" }}
  labels:
    app.kubernetes.io/name: qgis
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  strategy:
    # the home PVC is ReadWriteOnce: a surge pod on another node deadlocks on
    # Multi-Attach, so the old pod must terminate before the new one starts
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qgis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qgis
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if or .Values.mcp.enabled .Values.gallery.enabled }}
      annotations:
        # roll the pod when ConfigMap-shipped config changes: consumers only
        # read it at container/init start, so without these a config-only
        # change never reaches a running pod until an unrelated restart
        {{- if .Values.mcp.enabled }}
        checksum/mcp-scripts: {{ include (print $.Template.BasePath "/mcp-scripts.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.gallery.enabled }}
        checksum/gallery-nginx: {{ include (print $.Template.BasePath "/gallery-nginx.yaml") . | sha256sum }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}-qgis
      securityContext:
        fsGroup: {{ .Values.nbGID | int }}
      {{- if .Values.mcp.enabled }}
      initContainers:
        - name: mcp-plugin-install
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/init-mcp.sh"]
          env:
            - name: NB_USER
              value: {{ .Values.nbUser | quote }}
            - name: NB_UID
              value: {{ .Values.nbUID | quote }}
            - name: NB_GID
              value: {{ .Values.nbGID | quote }}
            - name: PLUGIN_REPO
              value: {{ .Values.mcp.repo | quote }}
            - name: PLUGIN_REF
              value: {{ .Values.mcp.ref | quote }}
            - name: PLUGIN_PORT
              value: {{ .Values.mcp.pluginPort | quote }}
          volumeMounts:
            - name: home
              mountPath: /home/{{ .Values.nbUser }}
            - name: mcp-scripts
              mountPath: /scripts
          {{- with .Values.mcp.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: qgis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NB_USER
              value: {{ .Values.nbUser | quote }}
            - name: NB_UID
              value: {{ .Values.nbUID | quote }}
            - name: NB_GID
              value: {{ .Values.nbGID | quote }}
            - name: CHOWN_HOME
              value: {{ .Values.chownHome | quote }}
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jupyterTokenSecretRef }}
                  key: {{ .Values.jupyterTokenKey }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: home
              mountPath: /home/{{ .Values.nbUser }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.mcp.enabled }}
        - name: mcp-server
          image: "{{ .Values.mcp.server.image.repository }}:{{ .Values.mcp.server.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.server.image.pullPolicy }}
          command:
            - uv
            - run
            - --no-project
            - --with
            - "qgis-mcp @ {{ .Values.mcp.repo }}/archive/{{ .Values.mcp.ref }}.zip"
            - python
            - /scripts/run_server.py
          env:
            # where the server CONNECTS: the plugin socket, pod-local
            - name: QGIS_MCP_HOST
              value: "127.0.0.1"
            - name: QGIS_MCP_PORT
              value: {{ .Values.mcp.pluginPort | quote }}
            # where the server LISTENS (streamable-HTTP, path /mcp)
            - name: MCP_LISTEN_HOST
              value: "0.0.0.0"
            - name: MCP_LISTEN_PORT
              value: {{ .Values.mcp.server.listenPort | quote }}
          ports:
            - name: mcp-http
              containerPort: {{ .Values.mcp.server.listenPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: mcp-http
            # uv resolves the qgis-mcp env from the network on start
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: mcp-scripts
              mountPath: /scripts
          {{- with .Values.mcp.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: desktop-kicker
          image: "{{ .Values.mcp.server.image.repository }}:{{ .Values.mcp.server.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.server.image.pullPolicy }}
          command: ["uv", "run", "--no-project", "python", "/scripts/session_kicker.py"]
          env:
            - name: JUPYTER_URL
              value: "http://127.0.0.1:8888"
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jupyterTokenSecretRef }}
                  key: {{ .Values.jupyterTokenKey }}
            - name: QGIS_MCP_PORT
              value: {{ .Values.mcp.pluginPort | quote }}
            - name: KICK_INTERVAL
              value: {{ .Values.mcp.kicker.intervalSeconds | quote }}
            - name: NB_HOME
              value: /home/{{ .Values.nbUser }}
          volumeMounts:
            - name: mcp-scripts
              mountPath: /scripts
            # diagnostics only: lets the kicker surface the Xfce/QGIS session
            # logs (~/.vnc/*.log), which are otherwise invisible to kubectl
            - name: home
              mountPath: /home/{{ .Values.nbUser }}
              readOnly: true
          {{- with .Values.mcp.kicker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- if .Values.gallery.enabled }}
        - name: gallery
          image: "{{ .Values.gallery.image.repository }}:{{ .Values.gallery.image.tag }}"
          imagePullPolicy: {{ .Values.gallery.image.pullPolicy }}
          ports:
            - name: gallery-http
              containerPort: {{ .Values.gallery.listenPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: gallery-http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            # renders only, read-only — never the whole home
            - name: home
              mountPath: /srv/qgis3d
              subPath: qgis3d
              readOnly: true
            - name: gallery-nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          {{- with .Values.gallery.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: qgis-home
        {{- if .Values.mcp.enabled }}
        - name: mcp-scripts
          configMap:
            name: qgis-mcp-scripts
        {{- end }}
        {{- if .Values.gallery.enabled }}
        - name: gallery-nginx
          configMap:
            name: qgis-gallery-nginx
        {{- end }}
