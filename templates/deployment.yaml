apiVersion: apps/v1
kind: Deployment
metadata:
  name: qgis
  namespace: {{ .Release.Namespace | default "qgis" }}
  labels:
    app.kubernetes.io/name: qgis
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  strategy:
    # the home PVC is ReadWriteOnce: a surge pod on another node deadlocks on
    # Multi-Attach, so the old pod must terminate before the new one starts
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qgis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qgis
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.mcp.enabled }}
      annotations:
        # roll the pod when the MCP scripts change: they ship via ConfigMap,
        # and the init container that consumes them only runs on pod start, so
        # without this a scripts-only change (e.g. a seed_ini fix) never
        # reaches a running pod until an unrelated restart
        checksum/mcp-scripts: {{ include (print $.Template.BasePath "/mcp-scripts.yaml") . | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Release.Name }}-qgis
      securityContext:
        fsGroup: {{ .Values.nbGID | int }}
      {{- if .Values.mcp.enabled }}
      initContainers:
        - name: mcp-plugin-install
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/init-mcp.sh"]
          env:
            - name: NB_USER
              value: {{ .Values.nbUser | quote }}
            - name: NB_UID
              value: {{ .Values.nbUID | quote }}
            - name: NB_GID
              value: {{ .Values.nbGID | quote }}
            - name: PLUGIN_REPO
              value: {{ .Values.mcp.repo | quote }}
            - name: PLUGIN_REF
              value: {{ .Values.mcp.ref | quote }}
            - name: PLUGIN_PORT
              value: {{ .Values.mcp.pluginPort | quote }}
          volumeMounts:
            - name: home
              mountPath: /home/{{ .Values.nbUser }}
            - name: mcp-scripts
              mountPath: /scripts
          {{- with .Values.mcp.initContainer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - name: qgis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NB_USER
              value: {{ .Values.nbUser | quote }}
            - name: NB_UID
              value: {{ .Values.nbUID | quote }}
            - name: NB_GID
              value: {{ .Values.nbGID | quote }}
            - name: CHOWN_HOME
              value: {{ .Values.chownHome | quote }}
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jupyterTokenSecretRef }}
                  key: {{ .Values.jupyterTokenKey }}
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          volumeMounts:
            - name: home
              mountPath: /home/{{ .Values.nbUser }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.mcp.enabled }}
        - name: mcp-server
          image: "{{ .Values.mcp.server.image.repository }}:{{ .Values.mcp.server.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.server.image.pullPolicy }}
          command:
            - uv
            - run
            - --no-project
            - --with
            - "qgis-mcp @ {{ .Values.mcp.repo }}/archive/{{ .Values.mcp.ref }}.zip"
            - python
            - /scripts/run_server.py
          env:
            # where the server CONNECTS: the plugin socket, pod-local
            - name: QGIS_MCP_HOST
              value: "127.0.0.1"
            - name: QGIS_MCP_PORT
              value: {{ .Values.mcp.pluginPort | quote }}
            # where the server LISTENS (streamable-HTTP, path /mcp)
            - name: MCP_LISTEN_HOST
              value: "0.0.0.0"
            - name: MCP_LISTEN_PORT
              value: {{ .Values.mcp.server.listenPort | quote }}
          ports:
            - name: mcp-http
              containerPort: {{ .Values.mcp.server.listenPort }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: mcp-http
            # uv resolves the qgis-mcp env from the network on start
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          volumeMounts:
            - name: mcp-scripts
              mountPath: /scripts
          {{- with .Values.mcp.server.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: desktop-kicker
          image: "{{ .Values.mcp.server.image.repository }}:{{ .Values.mcp.server.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.server.image.pullPolicy }}
          command: ["uv", "run", "--no-project", "python", "/scripts/session_kicker.py"]
          env:
            - name: JUPYTER_URL
              value: "http://127.0.0.1:8888"
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jupyterTokenSecretRef }}
                  key: {{ .Values.jupyterTokenKey }}
            - name: QGIS_MCP_PORT
              value: {{ .Values.mcp.pluginPort | quote }}
            - name: KICK_INTERVAL
              value: {{ .Values.mcp.kicker.intervalSeconds | quote }}
            - name: NB_HOME
              value: /home/{{ .Values.nbUser }}
          volumeMounts:
            - name: mcp-scripts
              mountPath: /scripts
            # diagnostics only: lets the kicker surface the Xfce/QGIS session
            # logs (~/.vnc/*.log), which are otherwise invisible to kubectl
            - name: home
              mountPath: /home/{{ .Values.nbUser }}
              readOnly: true
          {{- with .Values.mcp.kicker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: qgis-home
        {{- if .Values.mcp.enabled }}
        - name: mcp-scripts
          configMap:
            name: qgis-mcp-scripts
        {{- end }}
