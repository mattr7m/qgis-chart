image:
  repository: glcr.b-data.ch/jupyterlab/qgis/base
  tag: ltr
  pullPolicy: IfNotPresent

replicaCount: 1

# JupyterLab/NB user the image runs as; the home PVC mounts at /home/<nbUser>.
# Must stay "jovyan": the container runs non-root, so the b-data entrypoint
# cannot remap the user — a different value silently lands the PVC on an
# unused path while the real home stays pod-ephemeral (data loss).
nbUser: jovyan
nbUID: "1000"
nbGID: "1000"
# CHOWN_HOME needs a root entrypoint; non-root it only warns. fsGroup + the
# init container cover PVC ownership instead.
chownHome: false

# Secret (name + key) holding the JupyterLab auth token; referenced, never valued
jupyterTokenSecretRef: jupyterlab-token
jupyterTokenKey: token

service:
  type: ClusterIP
  port: 8888
  mcp:
    # Client-facing Service port for the MCP endpoint; only exposed when
    # mcp.enabled. Cluster-internal only — never routed on the Ingress.
    port: 8000
  gallery:
    # Service port for the 3D render gallery; only exposed when gallery.enabled
    port: 8080

# Static web gallery for the QGIS 3D renders (Qgis2threejs exports are web
# pages). Served by an nginx sidecar IN the qgis pod from the home PVC's
# qgis3d/ subPath, read-only — a sidecar rather than a separate Deployment so
# the RWO home volume never gains a second pod consumer (cross-node scheduling
# of a second consumer deadlocks on Multi-Attach; observed live on this claim).
# The qgis3d dir itself is created by the mcp init container, so gallery
# assumes mcp.enabled in practice (both are enabled together in ops values).
gallery:
  enabled: false
  image:
    repository: nginxinc/nginx-unprivileged
    tag: 1.27-alpine  # ops values pin by digest
    pullPolicy: IfNotPresent
  # nginx listens non-root on this container port
  listenPort: 8080
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 128Mi
  ingress:
    enabled: false
    host: qgis-3d.example.local
    className: traefik
    annotations: {}
    tls: true
    # Name of a traefik.io/v1alpha1 Middleware (same namespace) applying auth
    # to the gallery host, e.g. a basicAuth middleware whose htpasswd Secret is
    # created out of band. Empty = no auth middleware annotation (open).
    basicAuthMiddleware: ""

# qgis-mcp surface (nkarasiak/qgis-mcp): an init container installs the QGIS
# plugin into the profile PVC and seeds its socket-server autostart; a sidecar
# runs the FastMCP server (streamable-HTTP) bridging clients to that socket.
mcp:
  enabled: false
  repo: https://github.com/nkarasiak/qgis-mcp
  # Git ref used for BOTH the plugin install and the sidecar server so the two
  # halves stay in lockstep. Branch or tag (the init container clones with
  # --branch; a bare commit SHA will not work there).
  ref: main
  # TCP socket the QGIS plugin serves on — pod-local only, never on a Service
  pluginPort: 9876
  server:
    # Port the FastMCP sidecar LISTENs on (path /mcp); distinct from
    # pluginPort, which is where it CONNECTs
    listenPort: 8000
    image:
      repository: ghcr.io/astral-sh/uv
      tag: 0.11.28-python3.12-trixie-slim
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 1Gi
  initContainer:
    resources: {}
  # Starts the desktop session headlessly (first request to the JupyterLab
  # /desktop proxy route launches TurboVNC + Xfce; Xfce autostart launches
  # QGIS) and re-kicks it whenever the plugin socket is down. Separate
  # container so JUPYTER_TOKEN never enters the MCP-exposed server's env.
  kicker:
    intervalSeconds: 60
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi

ingress:
  enabled: true
  host: qgis.example.local
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls: true

pvc:
  enabled: true
  size: 10Gi
  storageClassName: rook-cephfs

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi
